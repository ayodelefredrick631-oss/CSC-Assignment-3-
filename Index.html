<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRO - Issues Reporting Outlet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            color: #333;
        }
        input[type="text"], select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            background-color: #27ae60;
            color: white;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #2ecc71;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Issues Reporting Outlet (IRO)</h2>
    <p class="subtitle">Securely report community issues to authorities</p>

    <form action="#" method="POST">
        <label for="location">Location of Issue</label>
        <select id="location" name="location" required>
            <option value="">-- Select Area --</option>
            <option value="AAUA Campus">AAUA Campus</option>
            <option value="Akungba">Akungba</option>
            <option value="Iwaro">Iwaro</option>
            <option value="Etioro">Etioro</option>
            <option value="Ayegunle">Ayegunle</option>
        </select>

        <label for="category">Issue Category</label>
        <select id="category" name="category" required>
            <option value="">-- Select Category --</option>
            <option value="Security">Security & Safety</option>
            <option value="Infrastructure">Road/Infrastructure</option>
            <option value="Utilities">Water & Electricity</option>
            <option value="Other">Other</option>
        </select>

        <label for="description">Issue Description</label>
        <textarea id="description" name="description" rows="5" placeholder="Describe the problem in detail..." required></textarea>

        <button type="submit">Submit Report</button>
    </form>
</div>

</body>
</html>
